version: 1
kind: algorithm-playground

meta:
  id: leetcode-prefix-sum
  title: Prefix Sum
  family: prefix-sum
  difficulty: foundation

dataset:
  type: int-array
  params:
    - name: nums
      required: true
    - name: left
      required: false
    - name: right
      required: false

ui:
  renderer: indexed-array
  controls: [play, pause, next, reset, speed]
  panels: [visual, variables, code, explanation]

examples:
  - id: middle-range
    label: Query middle range
    input:
      nums: [1, 1, 1, 2, 3]
      left: 1
      right: 3
  - id: from-zero
    label: Query from zero
    input:
      nums: [2, 4, 1, 3]
      left: 0
      right: 2

bindings:
  variables: [index, runningSum, answer]
  pointers:
    - name: index
      variable: index
      style: probe
  code:
    style: pseudocode
    lines:
      - id: init
        text: prefix[0] = nums[0]
      - id: extend
        text: prefix[i] = prefix[i - 1] + nums[i]
      - id: answer
        text: answer range query

program:
  entry: build_and_query
  macros:
    - init_running_sum
    - read_current
    - extend_prefix
    - answer_range_query
